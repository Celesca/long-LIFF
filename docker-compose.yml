services:
  postgres:
    image: postgres:16-alpine
    container_name: long-liff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: long_liff
      POSTGRES_USER: long_liff
      POSTGRES_PASSWORD: long_liff
    ports:
      - "5432:5432"
    volumes:
      - long_liff_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U long_liff -d long_liff"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    container_name: long-liff-backend
    restart: unless-stopped
    working_dir: /app/backend
    env_file:
      - path: backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://long_liff:long_liff@postgres:5432/long_liff
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --reload --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: node:22-alpine
    container_name: long-liff-frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_URL: http://localhost:8000
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - long_liff_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  long_liff_node_modules:
  long_liff_postgres_data:
