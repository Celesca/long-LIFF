services:
  postgres:
    image: postgres:16-alpine
    container_name: long-liff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-long_liff}
      POSTGRES_USER: ${POSTGRES_USER:-long_liff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-long_liff}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - long_liff_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-long_liff} -d ${POSTGRES_DB:-long_liff}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: python:3.12-slim
    container_name: long-liff-backend
    restart: unless-stopped
    working_dir: /app/backend
    env_file:
      - path: backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-long_liff}:${POSTGRES_PASSWORD:-long_liff}@postgres:5432/${POSTGRES_DB:-long_liff}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      IMAGE_CACHE_MANIFEST_PATH: /cache/image_manifest.json
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-longliff}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-longliff-dev-secret}
      MINIO_BUCKET: place-images
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
      - long_liff_image_cache:/cache:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: long-liff-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-longliff}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-longliff-dev-secret}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - long_liff_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  image-cache-worker:
    image: python:3.12-slim
    container_name: long-liff-image-cache-worker
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      PLACES_JSON_PATH: /app/data/places.json
      IMAGE_CACHE_MANIFEST_PATH: /cache/image_manifest.json
      IMAGE_CACHE_INTERVAL_SECONDS: ${IMAGE_CACHE_INTERVAL_SECONDS:-21600}
      IMAGE_CACHE_RETRY_HOURS: ${IMAGE_CACHE_RETRY_HOURS:-12}
      IMAGE_CACHE_MAX_PER_PLACE: ${IMAGE_CACHE_MAX_PER_PLACE:-3}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-longliff}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-longliff-dev-secret}
      MINIO_BUCKET: place-images
      REJECT_UNCHECKED_IMAGES: "true"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python cache_place_images.py --watch"
    volumes:
      - .:/app:ro
      - long_liff_image_cache:/cache
    depends_on:
      minio:
        condition: service_healthy

volumes:
  long_liff_image_cache:
  long_liff_minio_data:
  long_liff_postgres_data:
