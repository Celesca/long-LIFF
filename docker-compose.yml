services:
  postgres:
    image: postgres:16-alpine
    container_name: long-liff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: long_liff
      POSTGRES_USER: long_liff
      POSTGRES_PASSWORD: long_liff
    ports:
      - "5432:5432"
    volumes:
      - long_liff_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U long_liff -d long_liff"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  long_liff_postgres_data:
